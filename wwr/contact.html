<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Contact White Water Rafting Co. for reservations, questions, or feedback.">
    <meta name="author" content="Jacob Hawkins">

    <title>Contact Us | White Water Rafting Co.</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo.png" alt="Rafting Logo" class="logo">

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <h1>White Water Rafting Company</h1>

        <div class="company-info">
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>(999) 999-9999</p>
            <p>info@whitewater.com</p>
        </div>

        <!-- MAP + FORM -->
        <section class="contact-wrapper">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Grand+Canyon&output=embed"></iframe>
            </div>

            <!-- FORM -->
            <div class="form-container">
                <form action="#" method="post">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>

                    <p>Message Purpose</p>
                    <label><input type="radio" name="purpose" required> General Inquiry</label>
                    <label><input type="radio" name="purpose"> Reservation Question</label>
                    <label><input type="radio" name="purpose"> Website Suggestion</label>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type your message here..." required></textarea>

                    <label class="checkbox">
                        <input type="checkbox">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Send Message</button>

                </form>
            </div>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/employee1.jpeg" alt="John Carter - Lead River Guide">
                <figcaption>
                    <strong>John Carter</strong><br>
                    Lead River Guide
                </figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpeg" alt="Sarah Lopez - Operations Manager">
                <figcaption>
                    <strong>Sarah Lopez</strong><br>
                    Operations Manager
                </figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpeg" alt="Mike Thompson - Safety Instructor">
                <figcaption>
                    <strong>Mike Thompson</strong><br>
                    Safety Instructor
                </figcaption>
            </figure>

        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 White Water Rafting Co. | Jacob Hawkins</p>

        <div class="socialmedia">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
        </div>
    </footer>

</body>

</html>
