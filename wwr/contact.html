<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <meta name="description" content="Contact us for rafting reservations.">
    <link rel="stylesheet" href="rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="Logo" class="logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">

        <h1>Contact Us</h1>

        <section class="contact-grid">

            <div class="map">
                <iframe src="https://www.google.com/maps?q=Grand+Canyon&output=embed"></iframe>
            </div>

            <div class="form-container">
                <form>
                    <label>Name</label>
                    <input type="text" required>

                    <label>Email</label>
                    <input type="email" required>

                    <label>Message</label>
                    <textarea required></textarea>

                    <button type="submit">Send</button>
                </form>
            </div>

        </section>

    </main>

    <footer>
        <p>© 2026 White Water Rafting Co.</p>
    </footer>
