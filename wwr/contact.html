<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us | White Water Rafting Co.</title>

    <meta name="description"
      content="Contact White Water Rafting Co. for reservations, questions, or feedback.">
    <meta name="author" content="Jacob Hawkins">

    <link rel="stylesheet" href="rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.png" alt="White Water Rafting Logo" class="logo">

        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">

        <h1>Contact Us</h1>

        <!-- COMPANY INFO -->
        <section class="company-info">
            <p><strong>Address:</strong> 123 Main River Street, Springdale, Utah</p>
            <p><strong>Phone:</strong> (999) 999-9999</p>
            <p><strong>Email:</strong> info@whitewater.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-grid">

            <!-- MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Grand+Canyon&output=embed" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <!-- FORM -->
            <div class="form-container">
                <form action="#" method="post">

                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <p>Message Purpose</p>

                    <label>
                        <input type="radio" name="purpose" value="general" required>
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>

                    <label class="checkbox">
                        <input type="checkbox" name="subscribe">
                        Subscribe to newsletter
                    </label>

                    <button type="submit">Send Message</button>

                </form>
            </div>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="John Carter rafting guide">
                <figcaption><strong>John Carter</strong><br>Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Sarah Lopez manager">
                <figcaption><strong>Sarah Lopez</strong><br>Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Mike Thompson safety instructor">
                <figcaption><strong>Mike Thompson</strong><br>Safety Instructor</figcaption>
            </figure>

        </section>

    </main>

    <footer>
        <p>© 2026 White Water Rafting Co. | Jacob Hawkins</p>

        <div class="socialmedia">
            <a href="#" aria-label="Facebook"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#" aria-label="Twitter"><img src="images/twitter.png" alt="Twitter"></a>
        </div>
    </footer>

</body>

</html>
